<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Workout Log">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f1115">
  <title>Workout Log</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0d11;
      --surface: #171a21;
      --border: #3a4150;
      --text: #f5f7fa;
      --muted: #b4bcc9;
      --accent: #3d8bff;
      --accent-text: #ffffff;
      --chip-bg: #222733;
      --chip-border: #4a5366;
      --chip-selected: #2f7cf0;
      --chip-selected-ring: #cfe0ff;
      --danger: #ff6b6b;
      --radius: 12px;
      --field-gap: 1.4rem;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 390px;
      margin: 0 auto;
      padding:
        calc(1.35rem + env(safe-area-inset-top, 0px))
        1rem
        calc(2.25rem + env(safe-area-inset-bottom, 0px));
    }

    h1 {
      margin: 0 0 1.75rem;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: var(--field-gap);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    label,
    .field-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    input[type="date"],
    input[type="text"],
    textarea {
      width: 100%;
      padding: 0.8rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      min-height: 48px;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="date"] {
      color-scheme: dark;
    }

    input::placeholder,
    textarea::placeholder {
      color: #7d8696;
    }

    input:focus,
    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    textarea {
      min-height: 11rem;
      resize: vertical;
      line-height: 1.5;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .chips.energy {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
    }

    .chip {
      min-width: 44px;
      min-height: 44px;
      padding: 0.55rem 0.8rem;
      border: 1.5px solid var(--chip-border);
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--text);
      font: inherit;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .chips.energy .chip {
      border-radius: var(--radius);
      padding: 0.55rem 0.25rem;
      width: 100%;
      font-variant-numeric: tabular-nums;
    }

    /* High-contrast selected state for outdoor / bright light */
    .chip.selected {
      background: var(--chip-selected);
      border-color: #9ec2ff;
      color: var(--accent-text);
      font-weight: 700;
      box-shadow:
        0 0 0 2px var(--chip-selected-ring),
        0 1px 0 rgba(0, 0, 0, 0.35);
    }

    .other-input {
      display: none;
      margin-top: 0.15rem;
    }

    .other-input.visible {
      display: block;
    }

    button[type="submit"] {
      display: block;
      width: 100%;
      min-height: 52px;
      margin-top: 0.75rem;
      padding: 0.95rem 1rem;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--accent-text);
      font: inherit;
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.12) inset;
    }

    button[type="submit"]:active {
      filter: brightness(0.92);
    }

    /* Stage 5: validation highlight + copy fallback */
    .field.field-error .chips,
    .field.field-error input,
    .field.field-error textarea {
      outline: 2px solid var(--danger);
      outline-offset: 1px;
      border-color: var(--danger);
    }

    .field.field-error .field-label,
    .field.field-error > label {
      color: var(--danger);
    }

    .copy-fallback {
      display: none;
      margin-top: 1.15rem;
      padding: 1rem 1rem 1.05rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      flex-direction: column;
      gap: 0.8rem;
    }

    .copy-fallback.visible {
      display: flex;
    }

    .copy-fallback p {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .copy-fallback button {
      width: 100%;
      min-height: 48px;
      padding: 0.8rem 1rem;
      border: 1.5px solid var(--chip-border);
      border-radius: var(--radius);
      background: var(--chip-bg);
      color: var(--text);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
    }

    .copy-fallback button.copied {
      background: var(--chip-selected);
      border-color: #9ec2ff;
      color: var(--accent-text);
      box-shadow: 0 0 0 2px var(--chip-selected-ring);
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Workout Log</h1>

    <form id="workout-form" action="#" method="get">
      <!-- 1. Date -->
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>
      </div>

      <!-- 2. Focus -->
      <div class="field">
        <span class="field-label" id="focus-label">Focus</span>
        <div class="chips" role="group" aria-labelledby="focus-label" data-group="focus">
          <button type="button" class="chip" data-value="Lower">Lower</button>
          <button type="button" class="chip" data-value="Upper Push">Upper Push</button>
          <button type="button" class="chip" data-value="Upper Pull">Upper Pull</button>
          <button type="button" class="chip" data-value="Full Body">Full Body</button>
          <button type="button" class="chip" data-value="Other">Other</button>
        </div>
        <input
          type="text"
          id="focus-other"
          class="other-input"
          name="focus-other"
          placeholder="Describe focus"
          autocomplete="off"
        >
      </div>

      <!-- 3. Location -->
      <div class="field">
        <span class="field-label" id="location-label">Location</span>
        <div class="chips" role="group" aria-labelledby="location-label" data-group="location">
          <button type="button" class="chip" data-value="Rocklin">Rocklin</button>
          <button type="button" class="chip" data-value="Citrus Heights">Citrus Heights</button>
          <button type="button" class="chip" data-value="Other">Other</button>
        </div>
        <input
          type="text"
          id="location-other"
          class="other-input"
          name="location-other"
          placeholder="Describe location"
          autocomplete="off"
        >
      </div>

      <!-- 4. Fuel pre -->
      <div class="field">
        <label for="fuel-pre">Fuel pre</label>
        <input type="text" id="fuel-pre" name="fuel-pre" placeholder="Optional" autocomplete="off">
      </div>

      <!-- 5. Fuel mid -->
      <div class="field">
        <label for="fuel-mid">Fuel mid</label>
        <input type="text" id="fuel-mid" name="fuel-mid" placeholder="Optional" autocomplete="off">
      </div>

      <!-- 6. Energy first half -->
      <div class="field">
        <span class="field-label" id="energy1-label">Energy first half</span>
        <div class="chips energy" role="group" aria-labelledby="energy1-label" data-group="energy1">
          <button type="button" class="chip" data-value="1">1</button>
          <button type="button" class="chip" data-value="2">2</button>
          <button type="button" class="chip" data-value="3">3</button>
          <button type="button" class="chip" data-value="4">4</button>
          <button type="button" class="chip" data-value="5">5</button>
          <button type="button" class="chip" data-value="6">6</button>
          <button type="button" class="chip" data-value="7">7</button>
          <button type="button" class="chip" data-value="8">8</button>
          <button type="button" class="chip" data-value="9">9</button>
          <button type="button" class="chip" data-value="10">10</button>
        </div>
      </div>

      <!-- 7. Energy second half -->
      <div class="field">
        <span class="field-label" id="energy2-label">Energy second half</span>
        <div class="chips energy" role="group" aria-labelledby="energy2-label" data-group="energy2">
          <button type="button" class="chip" data-value="1">1</button>
          <button type="button" class="chip" data-value="2">2</button>
          <button type="button" class="chip" data-value="3">3</button>
          <button type="button" class="chip" data-value="4">4</button>
          <button type="button" class="chip" data-value="5">5</button>
          <button type="button" class="chip" data-value="6">6</button>
          <button type="button" class="chip" data-value="7">7</button>
          <button type="button" class="chip" data-value="8">8</button>
          <button type="button" class="chip" data-value="9">9</button>
          <button type="button" class="chip" data-value="10">10</button>
        </div>
      </div>

      <!-- 8. Exercise block -->
      <div class="field">
        <label for="exercises">Exercise block</label>
        <textarea
          id="exercises"
          name="exercises"
          rows="10"
          placeholder="Exercises, sets, reps…"
        ></textarea>
      </div>

      <!-- 9. Total time -->
      <div class="field">
        <label for="total-time">Total time (min)</label>
        <input type="text" id="total-time" name="total-time" inputmode="numeric" autocomplete="off">
      </div>

      <!-- 10. Active calories -->
      <div class="field">
        <label for="active-cal">Active calories</label>
        <input type="text" id="active-cal" name="active-cal" inputmode="numeric" autocomplete="off">
      </div>

      <!-- 11. Average heart rate -->
      <div class="field">
        <label for="avg-hr">Average heart rate</label>
        <input type="text" id="avg-hr" name="avg-hr" inputmode="numeric" autocomplete="off">
      </div>

      <!-- 12. Heart range -->
      <div class="field">
        <label for="hr-range">Heart range</label>
        <input type="text" id="hr-range" name="hr-range" placeholder="e.g. 105-164" autocomplete="off">
      </div>

      <button type="submit">Log workout</button>
    </form>

    <!-- Stage 5: always shown after a valid submit (custom schemes fail silently) -->
    <div id="copy-fallback" class="copy-fallback" aria-live="polite">
      <p>If Obsidian didn't open, copy the note and paste it manually.</p>
      <button type="button" id="copy-note">Copy note</button>
    </div>
  </div>

  <script>
    // --- Stage 1: default date to today (local, ISO YYYY-MM-DD) ---
    (function setToday() {
      var input = document.getElementById("date");
      var now = new Date();
      var yyyy = now.getFullYear();
      var mm = String(now.getMonth() + 1).padStart(2, "0");
      var dd = String(now.getDate()).padStart(2, "0");
      input.value = yyyy + "-" + mm + "-" + dd;
    })();

    // --- Stage 2: chip selection + "Other" reveals ---
    // Groups that can reveal a free-text "Other" input
    var otherFields = {
      focus: document.getElementById("focus-other"),
      location: document.getElementById("location-other")
    };

    function selectChip(group, chip) {
      // Clear selected state within this group only (single-select)
      var chips = group.querySelectorAll(".chip");
      for (var i = 0; i < chips.length; i++) {
        chips[i].classList.remove("selected");
      }
      chip.classList.add("selected");
      // No deselect-on-retap: tapping the same chip again leaves it selected

      var groupName = group.getAttribute("data-group");
      var otherInput = otherFields[groupName];
      if (!otherInput) {
        return; // energy groups have no "Other"
      }

      if (chip.getAttribute("data-value") === "Other") {
        otherInput.classList.add("visible");
        otherInput.focus();
      } else {
        otherInput.classList.remove("visible");
        otherInput.value = ""; // hide and clear when a named chip wins
      }
    }

    // Wire every chip group: click handler is a function we pass to addEventListener
    var groups = document.querySelectorAll(".chips[data-group]");
    for (var g = 0; g < groups.length; g++) {
      (function (group) {
        group.addEventListener("click", function (event) {
          var chip = event.target.closest(".chip");
          if (!chip || !group.contains(chip)) {
            return;
          }
          selectChip(group, chip);
        });
      })(groups[g]);
    }

    // --- Stage 3: note assembly (pure) + form collection (I/O) ---
    // buildNote: object in → string out. No DOM. Console-testable like check50.

    function selectedChipValue(groupName) {
      var group = document.querySelector('.chips[data-group="' + groupName + '"]');
      if (!group) {
        return "";
      }
      var selected = group.querySelector(".chip.selected");
      return selected ? selected.getAttribute("data-value") : "";
    }

    function collectForm() {
      var focusChip = selectedChipValue("focus");
      var locationChip = selectedChipValue("location");

      return {
        date: document.getElementById("date").value,
        focus: focusChip === "Other"
          ? document.getElementById("focus-other").value
          : focusChip,
        location: locationChip === "Other"
          ? document.getElementById("location-other").value
          : locationChip,
        fuel_pre: document.getElementById("fuel-pre").value,
        fuel_mid: document.getElementById("fuel-mid").value,
        energy1: selectedChipValue("energy1"),
        energy2: selectedChipValue("energy2"),
        exercise_block: document.getElementById("exercises").value,
        total_time: document.getElementById("total-time").value,
        active_cal: document.getElementById("active-cal").value,
        avg_hr: document.getElementById("avg-hr").value,
        hr_range: document.getElementById("hr-range").value
      };
    }

    function buildNote(data) {
      // Trailing blank lines only — internal blanks stay (verbatim exercise block)
      var exercises = String(data.exercise_block == null ? "" : data.exercise_block)
        .replace(/\n+$/, "");

      var date = data.date == null ? "" : data.date;
      var focus = data.focus == null ? "" : data.focus;
      var location = data.location == null ? "" : data.location;
      var fuelPre = data.fuel_pre == null ? "" : data.fuel_pre;
      var fuelMid = data.fuel_mid == null ? "" : data.fuel_mid;
      var energy1 = data.energy1 == null ? "" : data.energy1;
      var energy2 = data.energy2 == null ? "" : data.energy2;
      var totalTime = data.total_time == null ? "" : data.total_time;
      var activeCal = data.active_cal == null ? "" : data.active_cal;
      var avgHr = data.avg_hr == null ? "" : data.avg_hr;
      var hrRange = data.hr_range == null ? "" : data.hr_range;

      // Template literals ≈ Python f-strings: ${} where Python uses {}
      // Empty optionals keep the label (e.g. "  mid: ")
      return (
        "Date: " + date + "\n" +
        "Focus: " + focus + "\n" +
        "Location: " + location + "\n" +
        "Fuel:\n" +
        "  pre: " + fuelPre + "\n" +
        "  mid: " + fuelMid + "\n" +
        "Energy: first half " + energy1 + "/10, second half " + energy2 + "/10\n" +
        "\n" +
        exercises + "\n" +
        "\n" +
        "Total time: " + totalTime + "\n" +
        "Active calories: " + activeCal + "\n" +
        "Average heart rate: " + avgHr + "\n" +
        "Heart range: " + hrRange
      );
    }

    // Expose for browser-console checks (Stage 3 verification)
    window.collectForm = collectForm;
    window.buildNote = buildNote;

    // --- Stage 4: encode + redirect to Obsidian ---
    // encodeURIComponent (not encodeURI): escapes &, #, =, newlines in *values*
    // so they don't split the query string — the old Shortcuts bug.

    var VAULT = "second-brain";

    function buildObsidianUri(data, note) {
      var filePath = "Inbox/" + data.date + " Workout Log";
      return (
        "obsidian://new" +
        "?vault=" + encodeURIComponent(VAULT) +
        "&file=" + encodeURIComponent(filePath) +
        "&content=" + encodeURIComponent(note)
      );
    }

    // --- Stage 5: validation (guard clauses) + always-on copy fallback ---
    // Required: Focus, Location (non-empty if Other), both Energy chips, exercise block.
    // On fail: scroll + highlight first bad field — no alert(). Form never cleared.

    var lastNote = ""; // plain text held for Copy note after a successful submit

    function clearFieldErrors() {
      var errored = document.querySelectorAll(".field.field-error");
      for (var i = 0; i < errored.length; i++) {
        errored[i].classList.remove("field-error");
      }
    }

    function markFieldError(fieldEl) {
      if (fieldEl) {
        fieldEl.classList.add("field-error");
      }
    }

    function focusAndScroll(el) {
      if (!el) {
        return;
      }
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      if (typeof el.focus === "function") {
        try {
          el.focus({ preventScroll: true });
        } catch (e) {
          el.focus();
        }
      }
    }

    /**
     * Returns the first invalid control (or its .field), or null if all required pass.
     * Order matches the form top-to-bottom so "first bad field" is predictable.
     */
    function findFirstInvalid() {
      var focusChip = selectedChipValue("focus");
      var focusField = document.querySelector('[data-group="focus"]').closest(".field");
      var focusOther = document.getElementById("focus-other");
      if (!focusChip) {
        return { field: focusField, control: focusField };
      }
      if (focusChip === "Other" && focusOther.value.trim() === "") {
        return { field: focusField, control: focusOther };
      }

      var locationChip = selectedChipValue("location");
      var locationField = document.querySelector('[data-group="location"]').closest(".field");
      var locationOther = document.getElementById("location-other");
      if (!locationChip) {
        return { field: locationField, control: locationField };
      }
      if (locationChip === "Other" && locationOther.value.trim() === "") {
        return { field: locationField, control: locationOther };
      }

      var energy1 = selectedChipValue("energy1");
      var energy1Field = document.querySelector('[data-group="energy1"]').closest(".field");
      if (!energy1) {
        return { field: energy1Field, control: energy1Field };
      }

      var energy2 = selectedChipValue("energy2");
      var energy2Field = document.querySelector('[data-group="energy2"]').closest(".field");
      if (!energy2) {
        return { field: energy2Field, control: energy2Field };
      }

      var exercises = document.getElementById("exercises");
      if (exercises.value.trim() === "") {
        return { field: exercises.closest(".field"), control: exercises };
      }

      return null;
    }

    function showCopyFallback(note) {
      lastNote = note;
      var strip = document.getElementById("copy-fallback");
      var btn = document.getElementById("copy-note");
      strip.classList.add("visible");
      btn.textContent = "Copy note";
      btn.classList.remove("copied");
    }

    document.getElementById("copy-note").addEventListener("click", function () {
      var btn = document.getElementById("copy-note");
      if (!lastNote) {
        return;
      }
      // clipboard API needs a secure context (https) — Pages provides that
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(lastNote).then(function () {
          btn.textContent = "Copied";
          btn.classList.add("copied");
        }).catch(function () {
          // Fallback for rare clipboard denials: select via temporary textarea
          fallbackCopy(lastNote, btn);
        });
      } else {
        fallbackCopy(lastNote, btn);
      }
    });

    function fallbackCopy(text, btn) {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand("copy");
        btn.textContent = "Copied";
        btn.classList.add("copied");
      } catch (e) {
        btn.textContent = "Copy failed";
      }
      document.body.removeChild(ta);
    }

    // Clear error highlight when user fixes a field (chips or typing)
    document.getElementById("workout-form").addEventListener("click", function (event) {
      if (event.target.closest(".chip")) {
        var field = event.target.closest(".field");
        if (field) {
          field.classList.remove("field-error");
        }
      }
    });
    document.getElementById("workout-form").addEventListener("input", function (event) {
      var field = event.target.closest(".field");
      if (field) {
        field.classList.remove("field-error");
      }
    });

    document.getElementById("workout-form").addEventListener("submit", function (event) {
      event.preventDefault(); // stop normal form navigation

      clearFieldErrors();

      var invalid = findFirstInvalid();
      if (invalid) {
        markFieldError(invalid.field);
        focusAndScroll(invalid.control);
        return; // guard clause: do not navigate
      }

      var data = collectForm();
      var note = buildNote(data);
      var uri = buildObsidianUri(data, note);

      // Always reveal copy strip — scheme handoff can fail with no error to catch
      showCopyFallback(note);
      // Do not clear the form; data must survive if Obsidian never opens
      window.location.href = uri;
    });
  </script>
</body>
</html>
